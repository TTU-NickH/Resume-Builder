<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CodePup AI Resume Builder</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

<style>
.logo-img {
    max-width: 160px;
    filter: drop-shadow(0 6px 10px rgba(0,0,0,0.4));
}
</style>
</head>

<body style="background: linear-gradient(135deg, #4B2E83, #2c1a4d); min-height: 100vh;">

<div class="container py-5">

    <!-- HEADER -->
    <div class="text-center mb-4">
        <img src="images/CodingBulldog.png" alt="Coding Bulldog" class="logo-img d-block mx-auto mb-2 img-fluid">

        <h1 style="color:#C9A227; font-weight:700; margin-bottom:5px;">
            CodePup AI Resume Builder
        </h1>

        <p style="color:#e5d4a1; margin-bottom:0;">
            Build smarter resumes with your coding companion
        </p>
    </div>

    <div class="row g-4">

        <!-- LEFT SIDE -->
        <div class="col-lg-5">
            <div class="card shadow-lg" style="border-radius:15px; border:2px solid #C9A227;">
                <div class="card-body">

                    <h5 style="color:#4B2E83;">Gemini API Key</h5>
                    <input id="txtApiKey" class="form-control mb-2" placeholder="Enter API Key">

                    <button id="btnSaveApiKey" class="btn w-100 mb-2" style="background:#4B2E83; color:white;">
                        Save API Key
                    </button>

                    <button id="btnResetApp" class="btn btn-danger w-100 mb-3">
                        Reset App
                    </button>

                    <hr>

                    <h5 style="color:#4B2E83;">Personal Info</h5>
                    <input id="txtName" class="form-control mb-2" placeholder="Full Name">
                    <input id="txtEmail" class="form-control mb-2" placeholder="Email">
                    <input id="txtLocation" class="form-control mb-2" placeholder="Location">
                    <input id="txtLinkedin" class="form-control mb-2" placeholder="LinkedIn URL">

                    <button id="btnSaveUserInfo" class="btn w-100 mb-3" style="background:#C9A227;">
                        Save Info
                    </button>

                    <hr>

                    <h5 style="color:#4B2E83;">Add Job</h5>

                    <input id="txtJobTitle" class="form-control mb-2" placeholder="Job Title">
                    <input id="txtJobCompany" class="form-control mb-2" placeholder="Company">
                    <textarea id="txtJobDesc" class="form-control mb-3" placeholder="Description"></textarea>

                    <div class="d-flex gap-2">
                        <button id="btnAiImprove" class="btn w-50" style="background:#C9A227;">
                            AI Improve
                        </button>

                        <button id="btnAddJob" class="btn w-50" style="background:#4B2E83; color:white;">
                            Add Job
                        </button>
                    </div>

                    <hr>

                    <h5 style="color:#4B2E83;">Add Skill</h5>

                    <input id="txtSkillName" class="form-control mb-2" placeholder="Skill">

                    <button id="btnAddSkill" class="btn w-100" style="background:#C9A227;">
                        Add Skill
                    </button>

                </div>
            </div>
        </div>

        <!-- RIGHT SIDE -->
        <div class="col-lg-7">

            <div class="card shadow mb-4" style="border:2px solid #C9A227;">
                <div class="card-body">
                    <h5 style="color:#4B2E83;">Jobs</h5>
                    <div id="divJobList"></div>
                </div>
            </div>

            <div class="card shadow mb-4" style="border:2px solid #C9A227;">
                <div class="card-body">
                    <h5 style="color:#4B2E83;">Skills</h5>
                    <div id="divSkillList"></div>
                </div>
            </div>

            <div class="card shadow-lg" style="border:2px solid #C9A227;">
                <div class="card-body">

                    <h5 style="color:#4B2E83;">Generated Resume</h5>

                    <!-- 🔥 PDF BUTTON -->
                    <button id="btnPrintResume" class="btn w-100 mb-3" style="background:#4B2E83; color:white;">
                        Download Resume PDF
                    </button>

                    <div id="divResumeOutput" style="background:white; padding:15px;">
                        <p style="color: gray; text-align:center; margin-top:20px;">
                            Your resume will appear here...
                        </p>
                    </div>

                </div>
            </div>

        </div>

    </div>

</div>

<script>
const strBaseURL = 'http://localhost:8000';

document.addEventListener('DOMContentLoaded', () => {
    document.querySelector('#btnSaveApiKey').addEventListener('click', saveApiKey);
    document.querySelector('#btnResetApp').addEventListener('click', resetApp);
    document.querySelector('#btnSaveUserInfo').addEventListener('click', saveUserInfo);
    document.querySelector('#btnAiImprove').addEventListener('click', aiImprove);
    document.querySelector('#btnAddJob').addEventListener('click', addJob);
    document.querySelector('#btnAddSkill').addEventListener('click', addSkill);
    document.querySelector('#btnPrintResume').addEventListener('click', printResume);

    document.querySelector('#divJobList').addEventListener('click', (event) => {
        if (event.target.classList.contains('btnDeleteJob')) {
            const intJobID = event.target.getAttribute('data-job-id');
            deleteJob(intJobID);
        }
    });

    document.querySelector('#divResumeOutput').innerHTML = `
        <p style="color: gray; text-align:center; margin-top:20px;">
            Your resume will appear here...
        </p>
    `;
});

function saveApiKey() {
    const strApiKey = document.querySelector('#txtApiKey').value.trim();

    if (!strApiKey) {
        alert("Enter API key");
        return;
    }

    localStorage.setItem('geminiKey', strApiKey);
    document.querySelector('#txtApiKey').value = '';
    alert("API key saved");
}

async function resetApp() {
    document.querySelector('#divJobList').innerHTML = '';
    document.querySelector('#divSkillList').innerHTML = '';
    document.querySelector('#divResumeOutput').innerHTML = `
        <p style="color: gray; text-align:center; margin-top:20px;">
            Your resume will appear here...
        </p>
    `;

    document.querySelector('#txtName').value = '';
    document.querySelector('#txtEmail').value = '';
    document.querySelector('#txtLocation').value = '';
    document.querySelector('#txtLinkedin').value = '';
    document.querySelector('#txtJobTitle').value = '';
    document.querySelector('#txtJobCompany').value = '';
    document.querySelector('#txtJobDesc').value = '';
    document.querySelector('#txtSkillName').value = '';

    localStorage.clear();

    await fetch(`${strBaseURL}/reset`, {
        method: 'POST'
    });

    alert("App reset");
}

async function saveUserInfo() {
    const objUserInfo = {
        name: document.querySelector('#txtName').value,
        email: document.querySelector('#txtEmail').value,
        phone: '',
        location: document.querySelector('#txtLocation').value,
        linkedin: document.querySelector('#txtLinkedin').value
    };

    await fetch(`${strBaseURL}/user-info`, {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify(objUserInfo)
    });

    generateResumeFromDatabase();
}

async function addJob() {
    const objJob = {
        title: document.querySelector('#txtJobTitle').value,
        company: document.querySelector('#txtJobCompany').value,
        description: document.querySelector('#txtJobDesc').value
    };

    await fetch(`${strBaseURL}/jobs`, {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify(objJob)
    });

    document.querySelector('#txtJobTitle').value = '';
    document.querySelector('#txtJobCompany').value = '';
    document.querySelector('#txtJobDesc').value = '';

    loadJobs();
}

async function loadJobs() {
    const objResponse = await fetch(`${strBaseURL}/jobs`);
    const arrJobs = await objResponse.json();

    document.querySelector('#divJobList').innerHTML = '';

    arrJobs.forEach(objJob => {
        document.querySelector('#divJobList').innerHTML += `
            <div class="border p-2 mb-2 d-flex justify-content-between">
                <div>
                    <strong>${objJob.title}</strong><br>
                    <small>${objJob.company}</small>
                </div>
                <button class="btn btn-sm btn-danger btnDeleteJob" data-job-id="${objJob.id}">
                    X
                </button>
            </div>
        `;
    });

    generateResume(arrJobs);
}

async function deleteJob(intJobID) {
    await fetch(`${strBaseURL}/jobs/${intJobID}`, {
        method: 'DELETE'
    });

    loadJobs();
}

async function addSkill() {
    const objSkill = {
        name: document.querySelector('#txtSkillName').value
    };

    await fetch(`${strBaseURL}/skills`, {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify(objSkill)
    });

    document.querySelector('#txtSkillName').value = '';
    loadSkills();
}

async function loadSkills() {
    const objResponse = await fetch(`${strBaseURL}/skills`);
    const arrSkills = await objResponse.json();

    document.querySelector('#divSkillList').innerHTML = '';

    arrSkills.forEach(objSkill => {
        document.querySelector('#divSkillList').innerHTML += `
            <div class="border p-2 mb-2">
                ${objSkill.name}
            </div>
        `;
    });

    generateResumeFromDatabase();
}

async function aiImprove() {
    const strApiKey = localStorage.getItem('geminiKey');
    const strOriginalText = document.querySelector('#txtJobDesc').value;

    if (!strApiKey) {
        alert("Enter API key first");
        return;
    }

    if (!strOriginalText.trim()) {
        alert("Enter a description first");
        return;
    }

    document.querySelector('#txtJobDesc').value = "Improving with AI...";

    try {
        const objResponse = await fetch(
            `${strBaseURL}/improve-description?description=${encodeURIComponent(strOriginalText)}&apiKey=${encodeURIComponent(strApiKey)}`
        );

        const objData = await objResponse.json();
        document.querySelector('#txtJobDesc').value = objData.improved;

    } catch (error) {
        alert("AI improvement failed");
        document.querySelector('#txtJobDesc').value = strOriginalText;
    }
}

async function generateResume(arrJobs) {
    const objSkillResponse = await fetch(`${strBaseURL}/skills`);
    const arrSkills = await objSkillResponse.json();

    const objUserResponse = await fetch(`${strBaseURL}/user-info`);
    const objUser = await objUserResponse.json();

    if ((!arrJobs || arrJobs.length === 0) && arrSkills.length === 0 && !objUser.name) {
        document.querySelector('#divResumeOutput').innerHTML = `
            <p style="color: gray; text-align:center; margin-top:20px;">
                Your resume will appear here...
            </p>
        `;
        return;
    }

    let strHTML = '';

    if (objUser.name || objUser.email || objUser.location || objUser.linkedin) {
        strHTML += `
            <h3>${objUser.name || ''}</h3>
            <p>
                ${objUser.email || ''} 
                ${objUser.location ? '| ' + objUser.location : ''} 
                ${objUser.linkedin ? '| ' + objUser.linkedin : ''}
            </p>
            <hr>
        `;
    }

    strHTML += `<h5>Experience</h5>`;

    arrJobs.forEach(objJob => {
        strHTML += `
            <p>
                <strong>${objJob.title}</strong> - ${objJob.company}<br>
                ${objJob.description}
            </p>
        `;
    });

    strHTML += `<h5>Skills</h5>`;

    if (arrSkills.length > 0) {
        strHTML += `<p>${arrSkills.map(objSkill => objSkill.name).join(', ')}</p>`;
    }

    document.querySelector('#divResumeOutput').innerHTML = strHTML;
}

async function generateResumeFromDatabase() {
    const objResponse = await fetch(`${strBaseURL}/jobs`);
    const arrJobs = await objResponse.json();

    generateResume(arrJobs);
}

function printResume() {
    const strResumeHTML = document.querySelector('#divResumeOutput').innerHTML;

    const objPrintWindow = window.open('', '', 'width=800,height=1000');

    objPrintWindow.document.write(`
        <html>
        <head>
            <title>Resume PDF</title>
            <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
        </head>
        <body class="p-4">
            ${strResumeHTML}
        </body>
        </html>
    `);

    objPrintWindow.document.close();
    objPrintWindow.print();
}
</script>

</body>
</html>
